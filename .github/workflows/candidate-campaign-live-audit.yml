name: Candidate campaign live audit

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify committed campaign manifest
        shell: bash
        run: |
          set -euo pipefail
          files=(
            index.html brand-tokens.css styles.css app.js
            resume.html cover-letter.html interview-brief.html 120-day-plan.html
            hard-objection-analysis.html service-to-product-fold-canvas.html sources.html
            brand-intelligence.md assets/brand/ap-logo-lockup.svg
            docs/russell-dudek-acceleration-partners-resume.pdf
            docs/russell-dudek-acceleration-partners-cover-letter.pdf
            docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf
            docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf
            docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf
            docs/service-to-product-fold-canvas.pdf
          )
          for file in "${files[@]}"; do
            test -s "$file" || { echo "Missing or empty: $file"; exit 1; }
          done
          grep -Fq "Make AP's best client work" index.html
          grep -Fq 'href="brand-tokens.css"' index.html
          grep -Fq 'href="styles.css"' index.html
          grep -Fq 'src="app.js"' index.html
          grep -Fq 'assets/brand/ap-logo-lockup.svg' index.html
          grep -Fq 'View Cover Letter' resume.html
          grep -Fq 'View Resume' cover-letter.html
          grep -Fq 'https://russelldudek.github.io/acceleration/' resume.html
          grep -Fq 'https://russelldudek.github.io/acceleration/' cover-letter.html

      - name: Verify PDF contracts
        shell: bash
        run: |
          set -euo pipefail
          command -v pdfinfo >/dev/null || { sudo apt-get update -qq; sudo apt-get install -y poppler-utils; }
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-resume.pdf | awk '/^Pages:/{print $2}')" = "2"
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-cover-letter.pdf | awk '/^Pages:/{print $2}')" = "1"
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf | awk '/^Pages:/{print $2}')" = "3"
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf | awk '/^Pages:/{print $2}')" = "3"
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf | awk '/^Pages:/{print $2}')" = "2"
          test "$(pdfinfo docs/service-to-product-fold-canvas.pdf | awk '/^Pages:/{print $2}')" = "1"
          pdftotext docs/russell-dudek-acceleration-partners-resume.pdf - | grep -Fq 'https://russelldudek.github.io/acceleration/'
          pdftotext docs/russell-dudek-acceleration-partners-cover-letter.pdf - | grep -Fq 'https://russelldudek.github.io/acceleration/'

      - name: Wait for exact Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          base="https://russelldudek.github.io/acceleration"
          ready=0
          for attempt in $(seq 1 40); do
            if curl -fsSL --retry 2 "$base/index.html?sha=${GITHUB_SHA}&attempt=${attempt}" -o /tmp/live-index.html \
              && grep -Fq "Make AP's best client work" /tmp/live-index.html; then
              ready=1
              break
            fi
            echo "Pages has not published the candidate vision yet; retry $attempt/40"
            sleep 15
          done
          test "$ready" = "1" || { echo "Pages never served the candidate vision."; exit 1; }

          files=(
            index.html brand-tokens.css styles.css app.js
            resume.html cover-letter.html interview-brief.html 120-day-plan.html
            hard-objection-analysis.html service-to-product-fold-canvas.html sources.html
            assets/brand/ap-logo-lockup.svg
            docs/russell-dudek-acceleration-partners-resume.pdf
            docs/russell-dudek-acceleration-partners-cover-letter.pdf
            docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf
            docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf
            docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf
            docs/service-to-product-fold-canvas.pdf
          )
          for file in "${files[@]}"; do
            curl -fsSL --retry 3 "$base/$file?sha=${GITHUB_SHA}" -o "/tmp/live-${file//\//_}"
            cmp --silent "$file" "/tmp/live-${file//\//_}" || { echo "Live file differs from main: $file"; exit 1; }
          done

      - name: Install browser audit tooling
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Render and exercise the live campaign
        shell: bash
        run: |
          mkdir -p qa-live
          cat > /tmp/live-audit.cjs <<'JS'
          const { chromium } = require('playwright');
          const base = 'https://russelldudek.github.io/acceleration/';
          const routes = ['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','hard-objection-analysis.html','service-to-product-fold-canvas.html','sources.html'];
          const sizes = [
            ['desktop',1440,900],['laptop',1280,800],['tablet',768,1024],['mobile',390,844]
          ];
          (async()=>{
            const browser = await chromium.launch({headless:true});
            for (const [label,width,height] of sizes) {
              const context = await browser.newContext({viewport:{width,height}});
              for (const route of routes) {
                const page = await context.newPage();
                const errors=[];
                page.on('console',m=>{if(m.type()==='error') errors.push(`console:${m.text()}`)});
                page.on('pageerror',e=>errors.push(`page:${e.message}`));
                page.on('requestfailed',r=>errors.push(`request:${r.url()}`));
                await page.goto(base+route+'?audit='+Date.now(),{waitUntil:'networkidle'});
                const state = await page.evaluate(()=>({
                  sw:document.documentElement.scrollWidth,
                  cw:document.documentElement.clientWidth,
                  h1:document.querySelectorAll('h1').length,
                  body:document.body.innerText.slice(0,300)
                }));
                if(state.sw > state.cw + 1) throw new Error(`${route} overflows at ${label}: ${state.sw}/${state.cw}`);
                if(state.h1 < 1) throw new Error(`${route} has no h1 at ${label}`);
                if(errors.length) throw new Error(`${route} errors at ${label}: ${errors.join('|')}`);
                await page.screenshot({path:`qa-live/${label}-${route.replace('.html','')}.png`,fullPage:true});
                await page.close();
              }
              await context.close();
            }
            const context = await browser.newContext({viewport:{width:1280,height:800}});
            const page = await context.newPage();
            await page.goto(base+'index.html?interaction='+Date.now(),{waitUntil:'networkidle'});
            if(await page.locator('.decision-result').innerText() !== 'Assist') throw new Error('Baseline disposition is not Assist');
            await page.getByRole('tab',{name:'Publisher discovery'}).click();
            if(await page.locator('.decision-result').innerText() !== 'Productize') throw new Error('Publisher discovery did not resolve to Productize');
            await page.getByRole('button',{name:'Reset to reporting baseline'}).click();
            if(await page.locator('.decision-result').innerText() !== 'Assist') throw new Error('Reset did not restore Assist');
            await page.getByRole('tab',{name:'Weekly client reporting'}).focus();
            await page.keyboard.press('ArrowDown');
            if(!(await page.getByRole('tab',{name:'Publisher discovery'}).evaluate(el=>el===document.activeElement))) throw new Error('Keyboard tab movement failed');
            await context.close();
            const reduced = await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'});
            const reducedPage = await reduced.newPage();
            await reducedPage.goto(base+'index.html?reduced='+Date.now(),{waitUntil:'networkidle'});
            const animations = await reducedPage.evaluate(()=>document.getAnimations().filter(a=>a.playState==='running').length);
            if(animations) throw new Error(`Reduced-motion page has ${animations} running animations`);
            await reduced.close();
            await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node /tmp/live-audit.cjs

      - name: Preserve live render evidence
        uses: actions/upload-artifact@v4
        with:
          name: candidate-campaign-live-renders
          path: qa-live
          retention-days: 30
