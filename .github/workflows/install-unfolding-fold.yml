name: Install unfolding 3D Fold

on:
  push:
    branches: [fix/unfolding-three-fold]

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unfolding-three-fold
      - name: Install unfolding renderer
        env:
          FOLD_JS_GZIP_BASE64: 
        run: |
          python3 - <<'PY'
          import base64, gzip, os
          from pathlib import Path

          Path('three-fold.js').write_bytes(gzip.decompress(base64.b64decode(os.environ['FOLD_JS_GZIP_BASE64'])))

          test = Path('tests/origami-engine-audit.mjs')
          text = test.read_text()
          anchor = "  check(Array.isArray(baseline?.rotations) && baseline.rotations.length === 4, `${name}: missing baseline hinge rotations`);"
          addition = anchor + "\n  check(baseline?.phase === 'settled', `${name}: intro unfolding did not settle`);\n  check((baseline?.replayCount || 0) >= 1, `${name}: intro unfolding never ran`);\n  check((baseline?.unfoldDistance || 0) > 1, `${name}: intro did not travel through meaningful 3D fold geometry`);"
          if "intro unfolding did not settle" not in text:
              if anchor not in text:
                  raise SystemExit('audit anchor not found')
              text = text.replace(anchor, addition, 1)
          test.write_text(text)
          PY
          node --check three-fold.js
          grep -q "phase: 'booting'" three-fold.js
          grep -q "Click to replay unfolding" three-fold.js
      - name: Commit unfolding implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add three-fold.js tests/origami-engine-audit.mjs
          git commit -m 'Animate the Fold through 3D unfolding'
          git push origin HEAD:fix/unfolding-three-fold
