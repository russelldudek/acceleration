name: Build document download parity bundle

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install browser and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Patch CTA and document actions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          index = index_path.read_text()
          new_cta = '<div class="hero-actions" style="justify-content:center"><a class="button light" href="resume.html">Resume</a><a class="button secondary" href="cover-letter.html">Cover letter</a><a class="button secondary" href="interview-brief.html">Interview thesis brief</a></div>'
          if new_cta not in index:
              section_start = index.index('<section class="section final-cta">')
              actions_start = index.index('<div class="hero-actions" style="justify-content:center">', section_start)
              actions_end = index.index('</div>', actions_start) + len('</div>')
              index = index[:actions_start] + new_cta + index[actions_end:]
          index_path.write_text(index)

          filenames = {
              'docs/russell-dudek-acceleration-partners-resume.pdf': 'Russell-Dudek-Acceleration-Partners-Resume.pdf',
              'docs/russell-dudek-acceleration-partners-cover-letter.pdf': 'Russell-Dudek-Acceleration-Partners-Cover-Letter.pdf',
              'docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf': 'Russell-Dudek-Acceleration-Partners-Interview-Thesis-Brief.pdf',
              'docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf': 'Russell-Dudek-Acceleration-Partners-120-Day-Plan.pdf',
              'docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf': 'Russell-Dudek-Acceleration-Partners-Hard-Objection-Analysis.pdf',
              'docs/service-to-product-fold-canvas.pdf': 'Russell-Dudek-Service-to-Product-Fold-Canvas.pdf',
          }
          processed = []
          for path in sorted(Path('.').glob('*.html')):
              html = path.read_text()
              if 'class="doc-actions"' not in html:
                  continue
              html = re.sub(r'<button\b[^>]*>\s*Print\s*</button>', '', html)
              match = re.search(r'<a class="download" href="([^"]+)"(?: download="[^"]+")?>Download PDF</a>', html)
              if not match:
                  raise SystemExit(f'Download link not found in {path}')
              href = match.group(1)
              filename = filenames.get(href)
              if not filename:
                  raise SystemExit(f'No approved filename mapping for {href} in {path}')
              replacement = f'<a class="download" href="{href}" download="{filename}">Download PDF</a>'
              html = html[:match.start()] + replacement + html[match.end():]
              if 'window.print' in html or re.search(r'>\s*Print\s*</button>', html):
                  raise SystemExit(f'Print control remains in {path}')
              path.write_text(html)
              processed.append(path.name)
          if len(processed) != 6:
              raise SystemExit(f'Expected six document pages, processed {len(processed)}: {processed}')
          print('Patched document pages:', ', '.join(processed))
          PY
      - name: Start campaign server
        run: |
          python3 -m http.server 4173 >/tmp/acceleration-http.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4173/resume.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/acceleration-http.log
          exit 1
      - name: Generate HTML-derived resume PDF
        env:
          RESUME_BASE_URL: http://127.0.0.1:4173
          RESUME_PDF_OUTPUT: docs/russell-dudek-acceleration-partners-resume.pdf
        run: node scripts/generate-resume-pdf.mjs
      - name: Validate generated resume
        run: |
          mkdir -p document-parity-bundle/resume-render document-parity-bundle/validation
          pdfinfo docs/russell-dudek-acceleration-partners-resume.pdf | tee document-parity-bundle/validation/resume-pdfinfo.txt
          pdftotext docs/russell-dudek-acceleration-partners-resume.pdf document-parity-bundle/validation/resume-text.txt
          pdftoppm -png -r 160 docs/russell-dudek-acceleration-partners-resume.pdf document-parity-bundle/resume-render/page
          python3 - <<'PY'
          from pathlib import Path
          import re
          info = Path('document-parity-bundle/validation/resume-pdfinfo.txt').read_text()
          text = Path('document-parity-bundle/validation/resume-text.txt').read_text()
          pages = int(re.search(r'^Pages:\s+(\d+)', info, re.M).group(1))
          size = re.search(r'^Page size:\s+(.+)', info, re.M).group(1)
          required = ['Role-Aligned Experience', 'Applied AI Product Operating Model', 'Additional Experience', 'Candidate Thesis']
          missing = [term for term in required if term not in text]
          print({'pages': pages, 'size': size, 'missing_terms': missing})
          errors = []
          if pages != 2: errors.append(f'Expected 2 pages, found {pages}')
          if not ('612 x 792 pts' in size or 'letter' in size.lower()): errors.append(f'Expected US Letter, found {size}')
          if missing: errors.append(f'Missing extracted text: {missing}')
          if not Path('document-parity-bundle/resume-render/page-1.png').exists(): errors.append('Missing page-1 render')
          if not Path('document-parity-bundle/resume-render/page-2.png').exists(): errors.append('Missing page-2 render')
          if errors:
              raise SystemExit('; '.join(errors))
          PY
      - name: Audit corrected working tree
        env:
          AUDIT_URL: http://127.0.0.1:4173
          AUDIT_OUTPUT: document-parity-bundle/audit-evidence
        run: node scripts/audit-document-downloads.mjs
      - name: Package corrected source and PDF
        if: always()
        run: |
          mkdir -p document-parity-bundle/source/docs
          cp index.html resume.html cover-letter.html interview-brief.html 120-day-plan.html hard-objection.html service-to-product-fold-canvas.html document-parity-bundle/source/ || true
          cp docs/russell-dudek-acceleration-partners-resume.pdf document-parity-bundle/source/docs/ || true
      - name: Upload audited bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audited-document-parity-bundle
          path: document-parity-bundle
          if-no-files-found: error
