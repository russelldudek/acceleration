name: Live audit receipt

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-record:
    if: ${{ !contains(github.event.head_commit.message, '[audit receipt]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify source and PDF contracts
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html brand-tokens.css styles.css app.js
            resume.html cover-letter.html interview-brief.html 120-day-plan.html
            hard-objection-analysis.html service-to-product-fold-canvas.html sources.html
            assets/brand/ap-logo-lockup.svg
            docs/russell-dudek-acceleration-partners-resume.pdf
            docs/russell-dudek-acceleration-partners-cover-letter.pdf
            docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf
            docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf
            docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf
            docs/service-to-product-fold-canvas.pdf
          )
          for file in "${required[@]}"; do test -s "$file"; done
          grep -Fq "Make AP's best client work" index.html
          command -v pdfinfo >/dev/null || { sudo apt-get update -qq; sudo apt-get install -y poppler-utils; }
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-resume.pdf | awk '/^Pages:/{print $2}')" = 2
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-cover-letter.pdf | awk '/^Pages:/{print $2}')" = 1
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf | awk '/^Pages:/{print $2}')" = 3
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf | awk '/^Pages:/{print $2}')" = 3
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf | awk '/^Pages:/{print $2}')" = 2
          test "$(pdfinfo docs/service-to-product-fold-canvas.pdf | awk '/^Pages:/{print $2}')" = 1

      - name: Wait for Pages and compare published bytes
        shell: bash
        run: |
          set -euo pipefail
          base="https://russelldudek.github.io/acceleration"
          for attempt in $(seq 1 40); do
            if curl -fsSL "$base/index.html?receipt=${GITHUB_SHA}-${attempt}" -o /tmp/live-index \
              && grep -Fq "Make AP's best client work" /tmp/live-index; then
              break
            fi
            test "$attempt" -lt 40 || exit 1
            sleep 15
          done
          published=(
            index.html brand-tokens.css styles.css app.js
            resume.html cover-letter.html interview-brief.html 120-day-plan.html
            hard-objection-analysis.html service-to-product-fold-canvas.html sources.html
            assets/brand/ap-logo-lockup.svg
            docs/russell-dudek-acceleration-partners-resume.pdf
            docs/russell-dudek-acceleration-partners-cover-letter.pdf
            docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf
            docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf
            docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf
            docs/service-to-product-fold-canvas.pdf
          )
          for file in "${published[@]}"; do
            out="/tmp/${file//\//_}"
            curl -fsSL --retry 3 "$base/$file?receipt=${GITHUB_SHA}" -o "$out"
            cmp --silent "$file" "$out"
          done

      - name: Render responsive and interactive live states
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null
          cat > /tmp/audit.cjs <<'JS'
          const {chromium}=require('playwright');
          const base='https://russelldudek.github.io/acceleration/';
          const routes=['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','hard-objection-analysis.html','service-to-product-fold-canvas.html','sources.html'];
          const sizes=[[1440,900],[1280,800],[768,1024],[390,844]];
          (async()=>{const browser=await chromium.launch({headless:true});
            for(const [width,height] of sizes){const context=await browser.newContext({viewport:{width,height}});
              for(const route of routes){const page=await context.newPage();const errors=[];
                page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});page.on('pageerror',e=>errors.push(e.message));page.on('requestfailed',r=>errors.push(r.url()));
                await page.goto(base+route+'?render='+Date.now(),{waitUntil:'networkidle'});
                const s=await page.evaluate(()=>({sw:document.documentElement.scrollWidth,cw:document.documentElement.clientWidth,h1:document.querySelectorAll('h1').length}));
                if(s.sw>s.cw+1||s.h1<1||errors.length)throw new Error(`${route} ${width}x${height} ${JSON.stringify({s,errors})}`);await page.close();}
              await context.close();}
            const context=await browser.newContext({viewport:{width:1280,height:800}});const page=await context.newPage();await page.goto(base+'index.html?test='+Date.now(),{waitUntil:'networkidle'});
            if(await page.locator('.decision-result').innerText()!=='Assist')throw new Error('baseline');await page.getByRole('tab',{name:'Publisher discovery'}).click();if(await page.locator('.decision-result').innerText()!=='Productize')throw new Error('scenario');await page.getByRole('button',{name:'Reset to reporting baseline'}).click();if(await page.locator('.decision-result').innerText()!=='Assist')throw new Error('reset');await context.close();
            const reduced=await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'});const rp=await reduced.newPage();await rp.goto(base+'index.html?reduced='+Date.now(),{waitUntil:'networkidle'});if(await rp.evaluate(()=>document.getAnimations().filter(a=>a.playState==='running').length))throw new Error('reduced motion');await reduced.close();await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node /tmp/audit.cjs

      - name: Record successful live audit
        shell: bash
        run: |
          mkdir -p qa
          cat > qa/live-audit-result.json <<JSON
          {
            "status": "passed",
            "live_site": "https://russelldudek.github.io/acceleration/",
            "routes_rendered": 8,
            "viewports_per_route": 4,
            "reduced_motion": "passed",
            "interaction": "passed",
            "live_byte_comparison": "passed",
            "pdf_page_counts": "2/1/3/3/2/1",
            "recorded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          git config user.name "candidate-campaign-audit"
          git config user.email "actions@users.noreply.github.com"
          git add qa/live-audit-result.json
          git commit -m "Record successful live audit [audit receipt]"
          git push
