name: Verify published 3D Fold

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wait for exact public files
        run: |
          set -euo pipefail
          live='https://russelldudek.github.io/acceleration'
          files=(index.html origami-engine.css app.js three-fold.js assets/vendor/three/three.module.min.js assets/vendor/three/LICENSE)
          published=false
          for attempt in {1..90}; do
            ok=true
            for file in "${files[@]}"; do
              mkdir -p "/tmp/live/$(dirname "$file")"
              if ! curl -fsS "$live/$file?sha=${{ github.event.pull_request.base.sha }}&attempt=$attempt" -o "/tmp/live/$file"; then
                ok=false
                break
              fi
              if ! cmp -s "$file" "/tmp/live/$file"; then
                ok=false
                break
              fi
            done
            if $ok; then
              echo "Exact public 3D files verified on attempt $attempt."
              published=true
              break
            fi
            sleep 5
          done
          $published
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Audit the public WebGL experience
        env:
          AUDIT_URL: https://russelldudek.github.io/acceleration
          AUDIT_OUTPUT: live-three-fold-evidence
        run: node tests/origami-engine-audit.mjs
      - name: Upload public render evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-three-dimensional-fold-evidence
          path: live-three-fold-evidence
          if-no-files-found: error
