name: PR live campaign audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify source and PDFs
        shell: bash
        run: |
          set -euo pipefail
          files=(index.html brand-tokens.css styles.css app.js resume.html cover-letter.html interview-brief.html 120-day-plan.html hard-objection-analysis.html service-to-product-fold-canvas.html sources.html assets/brand/ap-logo-lockup.svg docs/russell-dudek-acceleration-partners-resume.pdf docs/russell-dudek-acceleration-partners-cover-letter.pdf docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf docs/service-to-product-fold-canvas.pdf)
          for file in "${files[@]}"; do test -s "$file" || { echo "Missing: $file"; exit 1; }; done
          grep -Fq "Make AP's best client work" index.html
          grep -Fq 'href="brand-tokens.css"' index.html
          grep -Fq 'href="styles.css"' index.html
          grep -Fq 'src="app.js"' index.html
          grep -Fq 'View Cover Letter' resume.html
          grep -Fq 'View Resume' cover-letter.html
          command -v pdfinfo >/dev/null || { sudo apt-get update -qq; sudo apt-get install -y poppler-utils; }
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-resume.pdf | awk '/^Pages:/{print $2}')" = 2
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-cover-letter.pdf | awk '/^Pages:/{print $2}')" = 1
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf | awk '/^Pages:/{print $2}')" = 3
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf | awk '/^Pages:/{print $2}')" = 3
          test "$(pdfinfo docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf | awk '/^Pages:/{print $2}')" = 2
          test "$(pdfinfo docs/service-to-product-fold-canvas.pdf | awk '/^Pages:/{print $2}')" = 1

      - name: Verify exact live publication
        shell: bash
        run: |
          set -euo pipefail
          base="https://russelldudek.github.io/acceleration"
          ready=0
          for attempt in $(seq 1 40); do
            if curl -fsSL "$base/index.html?pr=${GITHUB_SHA}-${attempt}" -o /tmp/live-index && grep -Fq "Make AP's best client work" /tmp/live-index; then ready=1; break; fi
            sleep 15
          done
          test "$ready" = 1
          files=(index.html brand-tokens.css styles.css app.js resume.html cover-letter.html interview-brief.html 120-day-plan.html hard-objection-analysis.html service-to-product-fold-canvas.html sources.html assets/brand/ap-logo-lockup.svg docs/russell-dudek-acceleration-partners-resume.pdf docs/russell-dudek-acceleration-partners-cover-letter.pdf docs/russell-dudek-acceleration-partners-interview-thesis-brief.pdf docs/russell-dudek-acceleration-partners-120-day-entry-plan.pdf docs/russell-dudek-acceleration-partners-hard-objection-analysis.pdf docs/service-to-product-fold-canvas.pdf)
          for file in "${files[@]}"; do
            out="/tmp/${file//\//_}"
            curl -fsSL --retry 3 "$base/$file?pr=${GITHUB_SHA}" -o "$out"
            cmp --silent "$file" "$out" || { echo "Published bytes differ: $file"; exit 1; }
          done

      - name: Install Playwright
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Audit live rendered routes
        shell: bash
        run: |
          mkdir -p qa-live
          cat > /tmp/audit.cjs <<'JS'
          const {chromium}=require('playwright');
          const base='https://russelldudek.github.io/acceleration/';
          const routes=['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','hard-objection-analysis.html','service-to-product-fold-canvas.html','sources.html'];
          const sizes=[['desktop',1440,900],['laptop',1280,800],['tablet',768,1024],['mobile',390,844]];
          (async()=>{const browser=await chromium.launch({headless:true});
            for(const [label,width,height] of sizes){const context=await browser.newContext({viewport:{width,height}});
              for(const route of routes){const page=await context.newPage();const errors=[];
                page.on('console',m=>{if(m.type()==='error')errors.push(`console:${m.text()}`)});page.on('pageerror',e=>errors.push(`page:${e.message}`));page.on('requestfailed',r=>errors.push(`request:${r.url()}`));
                await page.goto(base+route+'?render='+Date.now(),{waitUntil:'networkidle'});
                const s=await page.evaluate(()=>({sw:document.documentElement.scrollWidth,cw:document.documentElement.clientWidth,h1:document.querySelectorAll('h1').length,logo:document.querySelector('img')?.naturalWidth||0}));
                if(s.sw>s.cw+1)throw new Error(`${route} overflows ${label}: ${s.sw}/${s.cw}`);if(s.h1<1)throw new Error(`${route} missing h1 ${label}`);if(s.logo<1)throw new Error(`${route} logo did not render ${label}`);if(errors.length)throw new Error(`${route} errors ${label}: ${errors.join('|')}`);
                await page.screenshot({path:`qa-live/${label}-${route.replace('.html','')}.png`,fullPage:true});await page.close();}
              await context.close();}
            const context=await browser.newContext({viewport:{width:1280,height:800}});const page=await context.newPage();await page.goto(base+'index.html?interaction='+Date.now(),{waitUntil:'networkidle'});
            if(await page.locator('.decision-result').innerText()!=='Assist')throw new Error('bad baseline');await page.getByRole('tab',{name:'Publisher discovery'}).click();if(await page.locator('.decision-result').innerText()!=='Productize')throw new Error('bad scenario');await page.getByRole('button',{name:'Reset to reporting baseline'}).click();if(await page.locator('.decision-result').innerText()!=='Assist')throw new Error('bad reset');await page.getByRole('tab',{name:'Weekly client reporting'}).focus();await page.keyboard.press('ArrowDown');if(!(await page.getByRole('tab',{name:'Publisher discovery'}).evaluate(el=>el===document.activeElement)))throw new Error('keyboard navigation failed');await context.close();
            const reduced=await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'});const rp=await reduced.newPage();await rp.goto(base+'index.html?reduced='+Date.now(),{waitUntil:'networkidle'});const running=await rp.evaluate(()=>document.getAnimations().filter(a=>a.playState==='running').length);if(running)throw new Error(`reduced motion has ${running} running animations`);await reduced.close();await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node /tmp/audit.cjs

      - name: Upload rendered evidence
        uses: actions/upload-artifact@v4
        with:
          name: live-campaign-render-evidence
          path: qa-live
          retention-days: 30
