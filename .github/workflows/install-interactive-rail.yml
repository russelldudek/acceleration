name: Install interactive disposition rail

on:
  push:
    branches: [feature/interactive-disposition-rail]
    paths:
      - '.github/interactive-rail-trigger.txt'

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/interactive-disposition-rail
      - name: Patch source-native controls
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text()
          html = html.replace(
              '<link rel="stylesheet" href="origami-engine.css">',
              '<link rel="stylesheet" href="origami-engine.css">\n  <link rel="stylesheet" href="interactive-disposition.css">',
          )
          old = '''      <div class="three-fold-disposition" aria-label="Operating disposition">
        <div class="disposition-step" data-disposition="human" aria-current="false"><svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 28c0-6 3-10 9-10s9 4 9 10" fill="none" stroke="currentColor" stroke-width="2"/></svg><div><strong>Human-led</strong><small>Context remains decisive</small></div></div>
        <div class="disposition-step" data-disposition="assist" aria-current="true"><svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="11" cy="11" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="22" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 27c0-6 2-10 7-10s7 4 7 10M18 27c0-4 1-7 4-7s5 3 5 7" fill="none" stroke="currentColor" stroke-width="2"/></svg><div><strong>Assist</strong><small>AI prepares; experts decide</small></div></div>
        <div class="disposition-step" data-disposition="agentize" aria-current="false"><svg viewBox="0 0 32 32" aria-hidden="true"><rect x="5" y="8" width="22" height="17" rx="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 3v5M11 16h.01M21 16h.01M11 21h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><div><strong>Agentize</strong><small>Bounded autonomy + review</small></div></div>
        <div class="disposition-step" data-disposition="productize" aria-current="false"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 3l12 7-12 7L4 10l12-7zM4 10v13l12 7 12-7V10M16 17v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><div><strong>Productize</strong><small>Reusable capability at scale</small></div></div>
      </div>'''
          new = '''      <div class="three-fold-disposition" role="group" aria-label="Compare operating postures for the current workflow">
        <button type="button" class="disposition-step" data-disposition="human" aria-pressed="false"><svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 28c0-6 3-10 9-10s9 4 9 10" fill="none" stroke="currentColor" stroke-width="2"/></svg><span><strong>Human-led</strong><small>Context remains decisive</small></span></button>
        <button type="button" class="disposition-step" data-disposition="assist" aria-pressed="true"><svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="11" cy="11" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="22" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 27c0-6 2-10 7-10s7 4 7 10M18 27c0-4 1-7 4-7s5 3 5 7" fill="none" stroke="currentColor" stroke-width="2"/></svg><span><strong>Assist</strong><small>AI prepares; experts decide</small></span></button>
        <button type="button" class="disposition-step" data-disposition="agentize" aria-pressed="false"><svg viewBox="0 0 32 32" aria-hidden="true"><rect x="5" y="8" width="22" height="17" rx="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 3v5M11 16h.01M21 16h.01M11 21h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span><strong>Agentize</strong><small>Bounded autonomy + review</small></span></button>
        <button type="button" class="disposition-step" data-disposition="productize" aria-pressed="false"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 3l12 7-12 7L4 10l12-7zM4 10v13l12 7 12-7V10M16 17v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span><strong>Productize</strong><small>Reusable capability at scale</small></span></button>
      </div>'''
          if old not in html:
              raise SystemExit('Disposition source block not found')
          html = html.replace(old, new)
          html = html.replace('<script src="app.js"></script>', '<script type="module" src="app.js"></script>')
          path.write_text(html)
          PY
          grep -q 'button type="button" class="disposition-step"' index.html
          grep -q 'interactive-disposition.css' index.html
          grep -q 'type="module" src="app.js"' index.html
      - name: Commit source controls
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "feat: use source-native disposition buttons"
          git push origin HEAD:feature/interactive-disposition-rail
