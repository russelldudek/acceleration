name: Vendor pinned 3D dependency

on:
  push:
    branches: [fix/threejs-fold-engine]

permissions:
  contents: write

jobs:
  vendor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/threejs-fold-engine
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Copy pinned Three.js module locally
        run: |
          set -euo pipefail
          npm pack three@0.170.0
          mkdir -p /tmp/three-package assets/vendor/three
          tar -xzf three-0.170.0.tgz -C /tmp/three-package
          cp /tmp/three-package/package/build/three.module.min.js assets/vendor/three/three.module.min.js
          cp /tmp/three-package/package/LICENSE assets/vendor/three/LICENSE
          rm three-0.170.0.tgz
          grep -q 'const t="170"' assets/vendor/three/three.module.min.js
          grep -q 'The MIT License' assets/vendor/three/LICENSE
      - name: Commit vendored files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/vendor/three/three.module.min.js assets/vendor/three/LICENSE
          git commit -m 'Add local Three.js runtime'
          git push origin HEAD:fix/threejs-fold-engine
