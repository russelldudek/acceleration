name: Three-dimensional Fold audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify local 3D dependency
        run: |
          test -s assets/vendor/three/three.module.min.js
          test -s assets/vendor/three/LICENSE
          grep -q 'const t="170"' assets/vendor/three/three.module.min.js
          grep -q 'The MIT License' assets/vendor/three/LICENSE
          grep -q 'three-fold.js' index.html
          grep -q 'three-fold-canvas' index.html
          ! grep -q 'class="origami-sheet"' index.html
      - name: Install browser audit dependency
        run: |
          npm init -y
          npm install playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Start local campaign server
        run: |
          python3 -m http.server 4173 > /tmp/acceleration-http.log 2>&1 &
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/acceleration-http.log
          exit 1
      - name: Run local three-dimensional Fold audit
        env:
          AUDIT_URL: http://127.0.0.1:4173
          AUDIT_OUTPUT: audit-evidence/local
        run: |
          mkdir -p audit-evidence/local
          set +e
          node tests/origami-engine-audit.mjs 2>&1 | tee audit-evidence/local/audit.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Wait for live Pages publication
        if: github.event_name == 'push'
        run: |
          live='https://russelldudek.github.io/acceleration'
          for attempt in {1..90}; do
            html=$(curl -fsS "$live/index.html?sha=$GITHUB_SHA&attempt=$attempt" || true)
            css=$(curl -fsS "$live/origami-engine.css?sha=$GITHUB_SHA&attempt=$attempt" || true)
            renderer=$(curl -fsS "$live/three-fold.js?sha=$GITHUB_SHA&attempt=$attempt" || true)
            runtime=$(curl -fsS "$live/assets/vendor/three/three.module.min.js?sha=$GITHUB_SHA&attempt=$attempt" || true)
            if grep -Fq 'three-fold-canvas' <<<"$html" \
              && grep -Fq '.three-fold-stage' <<<"$css" \
              && grep -Fq 'WebGLRenderer' <<<"$renderer" \
              && grep -Fq 'const t="170"' <<<"$runtime"; then
              echo "Live Pages 3D publication detected on attempt $attempt."
              exit 0
            fi
            sleep 5
          done
          echo 'Live Pages did not publish the three-dimensional Fold within the audit window.'
          exit 1
      - name: Run live three-dimensional Fold audit
        if: github.event_name == 'push'
        env:
          AUDIT_URL: https://russelldudek.github.io/acceleration
          AUDIT_OUTPUT: audit-evidence/live
        run: |
          mkdir -p audit-evidence/live
          set +e
          node tests/origami-engine-audit.mjs 2>&1 | tee audit-evidence/live/audit.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-dimensional-fold-evidence
          path: audit-evidence
          if-no-files-found: ignore
