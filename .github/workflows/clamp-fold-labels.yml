name: Clamp projected fold labels

on:
  push:
    branches: [fix/threejs-fold-engine]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/threejs-fold-engine
      - name: Keep projected labels inside the stage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('three-fold.js')
          text = path.read_text()
          old = '''      const x = (projected.x * 0.5 + 0.5) * width;
                const y = (-projected.y * 0.5 + 0.5) * height;
                label.style.setProperty('--fold-label-x', `${x}px`);
                label.style.setProperty('--fold-label-y', `${y}px`);'''
          new = '''      let x = (projected.x * 0.5 + 0.5) * width;
                let y = (-projected.y * 0.5 + 0.5) * height;
                const halfWidth = label.offsetWidth / 2;
                const halfHeight = label.offsetHeight / 2;
                const horizontalInset = halfWidth + (width < 520 ? 8 : 12);
                const dispositionHeight = stage.querySelector('.three-fold-disposition')?.offsetHeight || 0;
                const verticalTop = halfHeight + 10;
                const verticalBottom = height - dispositionHeight - halfHeight - 14;
                x = THREE.MathUtils.clamp(x, horizontalInset, width - horizontalInset);
                y = THREE.MathUtils.clamp(y, verticalTop, Math.max(verticalTop, verticalBottom));
                label.style.setProperty('--fold-label-x', `${x}px`);
                label.style.setProperty('--fold-label-y', `${y}px`);'''
          if old not in text:
              raise SystemExit('projection block not found')
          path.write_text(text.replace(old, new))
          PY
          grep -q 'horizontalInset' three-fold.js
      - name: Commit projection repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add three-fold.js
          git commit -m 'Keep 3D fold labels inside the stage'
          git push origin HEAD:fix/threejs-fold-engine
